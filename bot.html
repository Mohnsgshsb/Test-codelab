<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLab - بيئة اختبار الأكواد</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-sidebar: #0a0e14;
            --terminal-bg: #0c0c0c;
            --terminal-green: #4ade80;
            --terminal-cyan: #22d3ee;
            --terminal-yellow: #facc15;
            --terminal-red: #f87171;
            --terminal-purple: #c084fc;
            --terminal-orange: #fb923c;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --success: #238636;
            --danger: #da3633;
            --warning: #d29922;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-header .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--terminal-green), var(--terminal-cyan));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--bg-primary);
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--terminal-green), var(--terminal-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-header p {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .search-box {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .languages-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .languages-list::-webkit-scrollbar {
            width: 6px;
        }

        .languages-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .languages-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .language-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 4px;
            border: 1px solid transparent;
        }

        .language-item:hover {
            background: var(--bg-secondary);
            border-color: var(--border-color);
        }

        .language-item.active {
            background: rgba(88, 166, 255, 0.1);
            border-color: var(--accent);
        }

        .language-item .lang-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .language-item .lang-info {
            flex: 1;
        }

        .language-item .lang-name {
            font-size: 14px;
            font-weight: 600;
        }

        .language-item .lang-ext {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .language-item.active .lang-name {
            color: var(--accent);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            height: 60px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .top-bar .current-lang {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-bar .current-lang .lang-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .top-bar .current-lang .lang-badge i {
            font-size: 16px;
        }

        .top-bar .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            outline: none;
        }

        .btn-run {
            background: var(--success);
            color: white;
        }

        .btn-run:hover {
            background: #2ea043;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(35, 134, 54, 0.3);
        }

        .btn-stop {
            background: var(--danger);
            color: white;
        }

        .btn-stop:hover {
            background: #f85149;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(218, 54, 51, 0.3);
        }

        .btn-clear {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-clear:hover {
            background: var(--border-color);
            transform: translateY(-1px);
        }

        .btn-copy {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
        }

        .btn-copy:hover {
            color: var(--text-primary);
            border-color: var(--accent);
        }

        /* Editor Area */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .editor-wrapper {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* Terminal Styling */
        .terminal {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--terminal-bg);
            position: relative;
        }

        .terminal-header {
            height: 40px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 8px;
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .terminal-dot.red { background: #ff5f56; }
        .terminal-dot.yellow { background: #ffbd2e; }
        .terminal-dot.green { background: #27c93f; }

        .terminal-title {
            margin-right: auto;
            margin-left: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .terminal-body {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* Line Numbers */
        .line-numbers {
            width: 50px;
            background: #0a0a0a;
            border-left: 1px solid #222;
            padding: 15px 0;
            text-align: center;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: #444;
            line-height: 1.6;
            overflow: hidden;
            user-select: none;
        }

        /* Code Editor */
        .code-editor {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .code-editor textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            padding: 15px;
            resize: none;
            tab-size: 4;
            white-space: pre;
            overflow: auto;
            direction: ltr;
            text-align: left;
        }

        .code-editor textarea::placeholder {
            color: #444;
        }

        /* Syntax Highlighting Overlay */
        .code-highlight {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            pointer-events: none;
            white-space: pre;
            overflow: hidden;
            color: var(--text-primary);
            direction: ltr;
            text-align: left;
        }

        /* Output Panel */
        .output-panel {
            height: 200px;
            background: var(--terminal-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: height 0.3s;
        }

        .output-panel.collapsed {
            height: 40px;
        }

        .output-header {
            height: 40px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        .output-header .tabs {
            display: flex;
            gap: 20px;
        }

        .output-header .tab {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .output-header .tab.active {
            color: var(--terminal-green);
            border-bottom-color: var(--terminal-green);
        }

        .output-header .tab:hover {
            color: var(--text-primary);
        }

        .output-toggle {
            cursor: pointer;
            color: var(--text-secondary);
            transition: transform 0.3s;
        }

        .output-toggle.collapsed {
            transform: rotate(180deg);
        }

        .output-content {
            flex: 1;
            padding: 15px 20px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow-y: auto;
            color: var(--terminal-green);
        }

        .output-content::-webkit-scrollbar {
            width: 8px;
        }

        .output-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .output-content::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        .output-line {
            margin-bottom: 4px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .output-prompt {
            color: var(--terminal-cyan);
            flex-shrink: 0;
        }

        .output-text {
            color: var(--terminal-green);
        }

        .output-error {
            color: var(--terminal-red);
        }

        .output-warning {
            color: var(--terminal-yellow);
        }

        /* Status Bar */
        .status-bar {
            height: 30px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 11px;
            color: var(--text-secondary);
            justify-content: space-between;
        }

        .status-bar .status-left {
            display: flex;
            gap: 20px;
        }

        .status-bar .status-right {
            display: flex;
            gap: 20px;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(74, 222, 128, 0.2); }
            50% { box-shadow: 0 0 20px rgba(74, 222, 128, 0.4); }
        }

        .running .btn-run {
            animation: pulse 1s infinite;
        }

        /* Loading Animation */
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: var(--terminal-green);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Cursor blink */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: var(--terminal-green);
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Scrollbar for textarea */
        .code-editor textarea::-webkit-scrollbar {
            width: 10px;
        }

        .code-editor textarea::-webkit-scrollbar-track {
            background: transparent;
        }

        .code-editor textarea::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 5px;
        }

        .code-editor textarea::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                right: -280px;
                z-index: 100;
                height: 100%;
            }
            
            .sidebar.open {
                right: 0;
            }
        }

        /* Tooltip */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 5px 10px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 11px;
            border-radius: 5px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            margin-bottom: 5px;
            border: 1px solid var(--border-color);
        }

        .tooltip:hover::after {
            opacity: 1;
        }

        /* Keyboard shortcut hint */
        .kbd {
            display: inline-block;
            padding: 2px 6px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 10px;
            font-family: 'Fira Code', monospace;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-terminal"></i>
            </div>
            <div>
                <h1>CodeLab</h1>
                <p>بيئة اختبار الأكواد</p>
            </div>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchLang" placeholder="ابحث عن لغة برمجة...">
        </div>
        
        <div class="languages-list" id="languagesList">
            <!-- Languages will be populated by JavaScript -->
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="current-lang">
                <div class="lang-badge">
                    <i class="fab fa-python" id="currentLangIcon"></i>
                    <span id="currentLangName">Python</span>
                </div>
            </div>
            
            <div class="actions">
                <button class="btn btn-copy tooltip" data-tooltip="نسخ الكود" onclick="copyCode()">
                    <i class="fas fa-copy"></i>
                </button>
                <button class="btn btn-clear tooltip" data-tooltip="مسح الكود (Ctrl+Delete)" onclick="clearCode()">
                    <i class="fas fa-trash-alt"></i>
                    مسح
                </button>
                <button class="btn btn-stop tooltip" data-tooltip="إيقاف التشغيل" onclick="stopCode()">
                    <i class="fas fa-stop"></i>
                    إيقاف
                </button>
                <button class="btn btn-run tooltip" data-tooltip="تشغيل (Ctrl+Enter)" onclick="runCode()">
                    <i class="fas fa-play"></i>
                    تشغيل
                </button>
            </div>
        </div>

        <!-- Editor -->
        <div class="editor-container">
            <div class="editor-wrapper">
                <div class="terminal">
                    <div class="terminal-header">
                        <div class="terminal-dot red"></div>
                        <div class="terminal-dot yellow"></div>
                        <div class="terminal-dot green"></div>
                        <span class="terminal-title" id="terminalTitle">main.py</span>
                    </div>
                    <div class="terminal-body">
                        <div class="line-numbers" id="lineNumbers">1</div>
                        <div class="code-editor">
                            <textarea id="codeEditor" spellcheck="false" placeholder="// اكتب كودك هنا...\n// اضغط Ctrl+Enter للتشغيل"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Output Panel -->
            <div class="output-panel" id="outputPanel">
                <div class="output-header">
                    <div class="tabs">
                        <div class="tab active" onclick="switchTab('output')">الناتج</div>
                        <div class="tab" onclick="switchTab('console')">الكونسول</div>
                    </div>
                    <i class="fas fa-chevron-down output-toggle" id="outputToggle" onclick="toggleOutput()"></i>
                </div>
                <div class="output-content" id="outputContent">
                    <div class="output-line">
                        <span class="output-prompt">$</span>
                        <span class="output-text">مرحباً بك في CodeLab! اختر لغة وابدأ البرمجة...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-left">
                <span id="cursorPos">Ln 1, Col 1</span>
                <span id="langMode">Python</span>
            </div>
            <div class="status-right">
                <span>UTF-8</span>
                <span id="fileSize">0 B</span>
            </div>
        </div>
    </main>

    <script>
        // Programming Languages Data
        const languages = [
            { id: 'python', name: 'Python', ext: '.py', icon: 'fab fa-python', color: '#3776ab', defaultCode: '# مرحباً بك في Python!\nprint("Hello, World!")\n\n# جرب كتابة كودك هنا\nfor i in range(5):\n    print(f"Number: {i}")' },
            { id: 'javascript', name: 'JavaScript', ext: '.js', icon: 'fab fa-js', color: '#f7df1e', defaultCode: '// مرحباً بك في JavaScript!\nconsole.log("Hello, World!");\n\n// جرب كتابة كودك هنا\nconst numbers = [1, 2, 3, 4, 5];\nnumbers.forEach(num => {\n    console.log(`Number: ${num}`);\n});' },
            { id: 'html', name: 'HTML', ext: '.html', icon: 'fab fa-html5', color: '#e34c26', defaultCode: '<!-- مرحباً بك في HTML! -->\n<!DOCTYPE html>\n<html>\n<head>\n    <title>My Page</title>\n</head>\n<body>\n    <h1>Hello, World!</h1>\n    <p>Welcome to CodeLab</p>\n</body>\n</html>' },
            { id: 'css', name: 'CSS', ext: '.css', icon: 'fab fa-css3-alt', color: '#264de4', defaultCode: '/* مرحباً بك في CSS! */\nbody {\n    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n    font-family: \'Cairo\', sans-serif;\n    color: #fff;\n    display: flex;\n    justify-content: center;\n    align-items: center;\n    height: 100vh;\n    margin: 0;\n}' },
            { id: 'cpp', name: 'C++', ext: '.cpp', icon: 'fas fa-code', color: '#00599c', defaultCode: '// مرحباً بك في C++!\n#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Hello, World!" << endl;\n    \n    for(int i = 0; i < 5; i++) {\n        cout << "Number: " << i << endl;\n    }\n    \n    return 0;\n}' },
            { id: 'java', name: 'Java', ext: '.java', icon: 'fab fa-java', color: '#007396', defaultCode: '// مرحباً بك في Java!\npublic class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello, World!");\n        \n        for(int i = 0; i < 5; i++) {\n            System.out.println("Number: " + i);\n        }\n    }\n}' },
            { id: 'csharp', name: 'C#', ext: '.cs', icon: 'fas fa-code', color: '#239120', defaultCode: '// مرحباً بك في C#!\nusing System;\n\nclass Program {\n    static void Main() {\n        Console.WriteLine("Hello, World!");\n        \n        for(int i = 0; i < 5; i++) {\n            Console.WriteLine($"Number: {i}");\n        }\n    }\n}' },
            { id: 'php', name: 'PHP', ext: '.php', icon: 'fab fa-php', color: '#777bb4', defaultCode: '<?php\n// مرحباً بك في PHP!\necho "Hello, World!\\n";\n\nfor($i = 0; $i < 5; $i++) {\n    echo "Number: $i\\n";\n}\n?>' },
            { id: 'ruby', name: 'Ruby', ext: '.rb', icon: 'fas fa-gem', color: '#cc342d', defaultCode: '# مرحباً بك في Ruby!\nputs "Hello, World!"\n\n(0...5).each do |i|\n  puts "Number: #{i}"\nend' },
            { id: 'go', name: 'Go', ext: '.go', icon: 'fab fa-golang', color: '#00add8', defaultCode: 'package main\n\nimport "fmt"\n\n// مرحباً بك في Go!\nfunc main() {\n    fmt.Println("Hello, World!")\n    \n    for i := 0; i < 5; i++ {\n        fmt.Printf("Number: %d\\n", i)\n    }\n}' },
            { id: 'rust', name: 'Rust', ext: '.rs', icon: 'fab fa-rust', color: '#dea584', defaultCode: '// مرحباً بك في Rust!\nfn main() {\n    println!("Hello, World!");\n    \n    for i in 0..5 {\n        println!("Number: {}", i);\n    }\n}' },
            { id: 'swift', name: 'Swift', ext: '.swift', icon: 'fab fa-swift', color: '#fa7343', defaultCode: '// مرحباً بك في Swift!\nprint("Hello, World!")\n\nfor i in 0..<5 {\n    print("Number: \\(i)")\n}' },
            { id: 'kotlin', name: 'Kotlin', ext: '.kt', icon: 'fab fa-android', color: '#7f52ff', defaultCode: '// مرحباً بك في Kotlin!\nfun main() {\n    println("Hello, World!")\n    \n    for(i in 0 until 5) {\n        println("Number: $i")\n    }\n}' },

            { id: 'nim', name: 'Nim', ext: '.nim', icon: 'fas fa-code', color: '#ffe953', defaultCode: '# مرحباً بك في Nim!\necho "Hello, World!"\n\nfor i in 0..4:\n  echo "Number: ", i' },

            { id: 'v', name: 'V', ext: '.v', icon: 'fas fa-code', color: '#536b8a', defaultCode: '// مرحباً بك في V!\nfn main() {\n    println('Hello, World!')\n    \n    for i in 0..5 {\n        println('Number: $i')\n    }\n}' },
            { id: 'solidity', name: 'Solidity', ext: '.sol', icon: 'fab fa-ethereum', color: '#363636', defaultCode: '// مرحباً بك في Solidity!\n// SPDX-License-Identifier: MIT\npragma solidity ^0.8.0;\n\ncontract HelloWorld {\n    string public message = "Hello, World!";\n    \n    function getMessage() public view returns (string memory) {\n        return message;\n    }\n    \n    function setMessage(string memory _message) public {\n        message = _message;\n    }\n}' },
            { id: 'webassembly', name: 'WebAssembly', ext: '.wat', icon: 'fas fa-code', color: '#654ff0', defaultCode: ';; مرحباً بك في WebAssembly!\n(module\n  (func $hello (export "hello")\n    ;; WebAssembly Text Format\n    (nop)\n  )\n)' }
        ];

        let currentLanguage = languages[0];
        let isRunning = false;
        let currentTab = 'output';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            renderLanguages();
            selectLanguage(languages[0].id);
            setupEventListeners();
            updateLineNumbers();
        });

        // Render Languages List
        function renderLanguages(filter = '') {
            const list = document.getElementById('languagesList');
            list.innerHTML = '';
            
            const filtered = languages.filter(lang => 
                lang.name.toLowerCase().includes(filter.toLowerCase()) ||
                lang.id.toLowerCase().includes(filter.toLowerCase())
            );
            
            filtered.forEach(lang => {
                const item = document.createElement('div');
                item.className = 'language-item';
                item.dataset.id = lang.id;
                item.onclick = () => selectLanguage(lang.id);
                
                item.innerHTML = `\n                    <div class="lang-icon" style="background: ${lang.color}20; color: ${lang.color};">\n                        <i class="${lang.icon}"></i>\n                    </div>\n                    <div class="lang-info">\n                        <div class="lang-name">${lang.name}</div>\n                        <div class="lang-ext">${lang.ext}</div>\n                    </div>\n                `;
                
                list.appendChild(item);
            });
        }

        // Select Language
        function selectLanguage(langId) {
            const lang = languages.find(l => l.id === langId);
            if (!lang) return;
            
            currentLanguage = lang;
            
            // Update sidebar
            document.querySelectorAll('.language-item').forEach(item => {
                item.classList.toggle('active', item.dataset.id === langId);
            });
            
            // Update top bar
            document.getElementById('currentLangIcon').className = lang.icon;
            document.getElementById('currentLangName').textContent = lang.name;
            document.getElementById('terminalTitle').textContent = `main${lang.ext}`;
            document.getElementById('langMode').textContent = lang.name;
            
            // Update editor
            const editor = document.getElementById('codeEditor');
            editor.value = lang.defaultCode;
            
            updateLineNumbers();
            updateFileSize();
            
            // Add animation
            document.querySelector('.current-lang').style.animation = 'none';
            setTimeout(() => {
                document.querySelector('.current-lang').style.animation = 'slideIn 0.3s ease';
            }, 10);
        }

        // Setup Event Listeners
        function setupEventListeners() {
            const editor = document.getElementById('codeEditor');
            const search = document.getElementById('searchLang');
            
            editor.addEventListener('input', function() {
                updateLineNumbers();
                updateFileSize();
            });
            
            editor.addEventListener('scroll', function() {
                document.getElementById('lineNumbers').scrollTop = this.scrollTop;
            });
            
            editor.addEventListener('keydown', function(e) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const start = this.selectionStart;
                    const end = this.selectionEnd;
                    this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
                    this.selectionStart = this.selectionEnd = start + 4;
                }
                
                if (e.ctrlKey && e.key === 'Enter') {
                    e.preventDefault();
                    runCode();
                }
                
                if (e.ctrlKey && e.key === 'Delete') {
                    e.preventDefault();
                    clearCode();
                }
            });
            
            search.addEventListener('input', function() {
                renderLanguages(this.value);
            });
        }

        // Update Line Numbers
        function updateLineNumbers() {
            const editor = document.getElementById('codeEditor');
            const lines = editor.value.split('\\n').length;
            const lineNumbers = document.getElementById('lineNumbers');
            lineNumbers.innerHTML = Array.from({length: lines}, (_, i) => i + 1).join('<br>');
        }

        // Update File Size
        function updateFileSize() {
            const editor = document.getElementById('codeEditor');
            const size = new Blob([editor.value]).size;
            let sizeStr;
            if (size < 1024) sizeStr = size + ' B';
            else if (size < 1024 * 1024) sizeStr = (size / 1024).toFixed(1) + ' KB';
            else sizeStr = (size / (1024 * 1024)).toFixed(1) + ' MB';
            document.getElementById('fileSize').textContent = sizeStr;
        }

        // Run Code
        function runCode() {
            if (isRunning) return;
            
            isRunning = true;
            document.body.classList.add('running');
            
            const output = document.getElementById('outputContent');
            const code = document.getElementById('codeEditor').value;
            
            output.innerHTML = `\n                <div class="output-line">\n                    <span class="output-prompt">$</span>\n                    <span class="output-text">تشغيل ${currentLanguage.name}...\n                        <span class="loading-dots">\n                            <span></span><span></span><span></span>\n                        </span>\n                    </span>\n                </div>\n            `;
            
            // Simulate execution
            setTimeout(() => {
                const result = simulateExecution(code, currentLanguage.id);
                output.innerHTML = result;
                isRunning = false;
                document.body.classList.remove('running');
            }, 1500);
        }

        // Simulate Execution
        function simulateExecution(code, langId) {
            const timestamp = new Date().toLocaleTimeString('ar-SA');
            let output = '';
            
            output += `<div class="output-line">\n                <span class="output-prompt">$</span>\n                <span class="output-text">[${timestamp}] تشغيل ${currentLanguage.name}...</span>\n            </div>`;
            
            // Simple simulation based on language
            if (langId === 'python') {
                if (code.includes('print')) {
                    const matches = code.match(/print\\s*\\(([^)]+)\\)/g);
                    if (matches) {
                        matches.forEach(match => {
                            const content = match.replace(/print\\s*\\(/, '').replace(/\\)$/, '');
                            output += `<div class="output-line">\n                                <span class="output-prompt">></span>\n                                <span class="output-text">${content.replace(/["']/g, '')}</span>\n                            </div>`;
                        });
                    }
                }
            } else if (langId === 'javascript' || langId === 'typescript') {
                if (code.includes('console.log')) {
                    const matches = code.match(/console\\.log\\s*\\(([^)]+)\\)/g);
                    if (matches) {
                        matches.forEach(match => {
                            const content = match.replace(/console\\.log\\s*\\(/, '').replace(/\\)$/, '');
                            output += `<div class="output-line">\n                                <span class="output-prompt">></span>\n                                <span class="output-text">${content.replace(/["'`]/g, '').replace(/\\$\\{[^}]+\\}/g, '...')}</span>\n                            </div>`;
                        });
                    }
                }
            } else if (langId === 'html') {
                output += `<div class="output-line">\n                    <span class="output-prompt">></span>\n                    <span class="output-text" style="color: var(--terminal-cyan);">HTML rendered successfully!</span>\n                </div>`;
                output += `<div class="output-line">\n                    <span class="output-prompt">></span>\n                    <span class="output-text">Page title: ${code.match(/<title>([^<]+)<\\/title>/)?.[1] || 'Untitled'}</span>\n                </div>`;
            } else if (langId === 'css') {
                output += `<div class="output-line">\n                    <span class="output-prompt">></span>\n                    <span class="output-text" style="color: var(--terminal-cyan);">CSS compiled successfully!</span>\n                </div>`;
                output += `<div class="output-line">\n                    <span class="output-prompt">></span>\n                    <span class="output-text">Selectors found: ${(code.match(/\\{/g) || []).length}</span>\n                </div>`;
            } else {
                output += `<div class="output-line">\n                    <span class="output-prompt">></span>\n                    <span class="output-text">Hello, World!</span>\n                </div>`;
                output += `<div class="output-line">\n                    <span class="output-prompt">></span>\n                    <span class="output-text">Code executed successfully!</span>\n                </div>`;
            }
            
            output += `<div class="output-line" style="margin-top: 10px;">\n                <span class="output-prompt">$</span>\n                <span class="output-text" style="color: var(--terminal-cyan);">✓ انتهى التنفيذ بنجاح</span>\n            </div>`;
            
            return output;
        }

        // Stop Code
        function stopCode() {
            if (!isRunning) {
                const output = document.getElementById('outputContent');
                output.innerHTML += `<div class="output-line">\n                    <span class="output-prompt">$</span>\n                    <span class="output-warning">لا يوجد عملية قيد التشغيل</span>\n                </div>`;
                return;
            }
            
            isRunning = false;
            document.body.classList.remove('running');
            
            const output = document.getElementById('outputContent');
            output.innerHTML += `<div class="output-line">\n                <span class="output-prompt">$</span>\n                <span class="output-error">✗ تم إيقاف التنفيذ</span>\n            </div>`;
        }

        // Clear Code
        function clearCode() {
            const editor = document.getElementById('codeEditor');
            editor.value = '';
            updateLineNumbers();
            updateFileSize();
            
            const output = document.getElementById('outputContent');
            output.innerHTML = `<div class="output-line">\n                <span class="output-prompt">$</span>\n                <span class="output-text">تم مسح الكود</span>\n            </div>`;
        }

        // Copy Code
        function copyCode() {
            const editor = document.getElementById('codeEditor');
            editor.select();
            document.execCommand('copy');
            
            const output = document.getElementById('outputContent');
            output.innerHTML += `<div class="output-line">\n                <span class="output-prompt">$</span>\n                <span class="output-text" style="color: var(--terminal-cyan);">✓ تم نسخ الكود إلى الحافظة</span>\n            </div>`;
        }

        // Toggle Output
        function toggleOutput() {
            const panel = document.getElementById('outputPanel');
            const toggle = document.getElementById('outputToggle');
            panel.classList.toggle('collapsed');
            toggle.classList.toggle('collapsed');
        }

        // Switch Tab
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Update cursor position
        document.getElementById('codeEditor').addEventListener('keyup', function() {
            const lines = this.value.substring(0, this.selectionStart).split('\\n');
            const line = lines.length;
            const col = lines[lines.length - 1].length + 1;
            document.getElementById('cursorPos').textContent = `Ln ${line}, Col ${col}`;
        });

        document.getElementById('codeEditor').addEventListener('click', function() {
            const lines = this.value.substring(0, this.selectionStart).split('\\n');
            const line = lines.length;
            const col = lines[lines.length - 1].length + 1;
            document.getElementById('cursorPos').textContent = `Ln ${line}, Col ${col}`;
        });
    </script>
</body>
